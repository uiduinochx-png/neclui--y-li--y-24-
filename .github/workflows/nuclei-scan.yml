                  ]
                  self.collect_from_source('TopGlobal', top_websites, 'Popular')
              
              def collect_from_asia(self):
                  """CHIP V10.0 lấy Web Châu Á"""
                  print("🔍 CHIP V10.0: Châu Á...")
                  asia_websites = [
                      # Japan
                      'google.co.jp', 'amazon.co.jp', 'rakuten.co.jp', 'yahoo.co.jp', 'live.com',
                      'wikipedia.org', 'facebook.com', 'twitter.com', 'instagram.com', 'youtube.com',
                      # China
                      'baidu.com', 'qq.com', 'taobao.com', 'tmall.com', 'jd.com',
                      'weibo.com', 'sohu.com', '163.com', 'sina.com.cn', 'xinhuanet.com',
                      # South Korea
