name: "🧠 CHỦ NHÂN VŨ TRỤ - BỘ NÃO THÔNG MINH 1000%"

on:
  workflow_dispatch:
    inputs:
      severity_level:
        description: '📊 MỨC ĐỘ LỖ HỔNG'
        required: false
        default: 'critical,high,medium,low,info'
        type: choice
        options:
          - critical,high
          - critical,high,medium
          - critical,high,medium,low
          - critical,high,medium,low,info
      scan_depth:
        description: '🔍 ĐỘ SÂU QUÉT'
        required: false
        default: 'ultimate'
        type: choice
        options:
          - fast
          - medium
          - deep
          - ultimate
      intelligence_level:
        description: '🧠 CẤP ĐỘ TRÍ TUỆ'
        required: false
        default: 'maximum'
        type: choice
        options:
          - basic
          - advanced
          - expert
          - maximum
  schedule:
    - cron: '0 */2 * * *'

jobs:
  ultimate-scan:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 TẢI MÃ NGUỒN
        uses: actions/checkout@v4

      - name: 📦 CÀI ĐẶT CÔNG CỤ TỐI THƯỢNG
        run: |
          echo "🧠 ĐANG CÀI ĐẶT CÔNG CỤ..."
          
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            jq curl git python3 python3-pip \
            massdns dnsrecon dnsenum \
            nmap ffuf unzip wget \
            && sudo rm -rf /var/lib/apt/lists/*
          
          echo "📥 ĐANG TẢI NUCLEI..."
          sudo snap install go --classic
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          sudo cp ~/go/bin/nuclei /usr/local/bin/
          nuclei -version || echo "⚠️ Lỗi cài nuclei"
          
          pip3 install -q requests beautifulsoup4 lxml
          
          nuclei -update-templates -silent
          nuclei -templates-version
          
          mkdir -p /tmp/ultimate-templates
          
          echo "📥 ĐANG TẢI TEMPLATE KHỦNG..."
          git clone --depth 1 -q https://github.com/geeknik/nuclei-templates.git /tmp/ultimate-templates/geeknik 2>/dev/null || true
          git clone --depth 1 -q https://github.com/notnotnotveg/nuclei-templates.git /tmp/ultimate-templates/extra 2>/dev/null || true
          git clone --depth 1 -q https://github.com/random-robbie/nuclei-templates.git /tmp/ultimate-templates/random 2>/dev/null || true
          git clone --depth 1 -q https://github.com/projectdiscovery/nuclei-templates.git /tmp/ultimate-templates/official 2>/dev/null || true
          
          echo "✅ CÀI ĐẶT HOÀN TẤT!"

      - name: 🧠 TẠO BỘ NÃO TRÍ TUỆ NHÂN TẠO
        id: create_ai_brain
        run: |
          echo "🧠 ĐANG TẠO BỘ NÃO TRÍ TUỆ NHÂN TẠO..."
          
          cat > ai_brain.py << 'PYEOF'
          import json, re, requests, random, time, sys
          from bs4 import BeautifulSoup
          from datetime import datetime
          from collections import defaultdict
          
          print("="*80)
          print("🧠 CHỦ NHÂN VŨ TRỤ - BỘ NÃO TRÍ TUỆ NHÂN TẠO 1000%")
          print("="*80)
          
          # ============================================================
          # 1. CƠ SỞ DỮ LIỆU THÔNG MINH
          # ============================================================
          
          # Lỗi đã vá (không quét)
          patched_vulnerabilities = {
              'critical': ['CVE-2024-1234', 'CVE-2024-5678', 'CVE-2024-9012'],
              'high': ['CVE-2024-3456', 'CVE-2024-7890', 'CVE-2024-2345'],
              'medium': ['CVE-2024-1111', 'CVE-2024-2222', 'CVE-2024-3333'],
          }
          
          # Lỗi giá trị cao (ưu tiên)
          high_value_patterns = [
              'SQL Injection', 'RCE', 'Command Injection',
              'Authentication Bypass', 'Privilege Escalation',
              'File Upload', 'Local File Inclusion', 'Remote File Inclusion',
              'XXE', 'SSRF', 'Deserialization', 'JWT Attack',
              'Business Logic', 'Payment Bypass', 'Cryptographic Failure',
              'Smart Contract', 'Reentrancy', 'Flash Loan Attack',
              'Access Control', 'IDOR', 'CSRF', 'XSS',
          ]
          
          # ============================================================
          # 2. HÀM TƯ DUY LOGIC
          # ============================================================
          
          class AIBrain:
              def __init__(self):
                  self.knowledge_base = {}
                  self.learned_patterns = []
                  self.decision_history = []
                  self.intelligence_level = 1000  # 1000% thông minh
                  
              def analyze_vulnerability(self, cve_id, name, description, severity):
                  """Phân tích lỗ hổng một cách logic"""
                  result = {
                      'is_valuable': False,
                      'score': 0,
                      'reason': '',
                      'action': 'skip',
                      'priority': 0
                  }
                  
                  # Kiểm tra đã vá chưa
                  if cve_id in patched_vulnerabilities.get(severity, []):
                      result['reason'] = 'Đã được vá'
                      result['score'] = 0
                      return result
                  
                  # Đánh giá giá trị
                  score = 0
                  for pattern in high_value_patterns:
                      if pattern.lower() in name.lower() or pattern.lower() in description.lower():
                          score += 10
                          result['reason'] = f'Lỗi giá trị cao: {pattern}'
                  
                  # Đánh giá dựa trên severity
                  severity_scores = {'critical': 50, 'high': 30, 'medium': 15, 'low': 5, 'info': 2}
                  score += severity_scores.get(severity, 0)
                  
                  # Quyết định
                  if score >= 40:
                      result['is_valuable'] = True
                      result['action'] = 'report'
                      result['priority'] = 1
                  elif score >= 20:
                      result['is_valuable'] = True
                      result['action'] = 'review'
                      result['priority'] = 2
                  else:
                      result['action'] = 'skip'
                      result['priority'] = 3
                  
                  result['score'] = score
                  return result
              
              def learn(self, data):
                  """Học từ kết quả quét"""
                  self.knowledge_base['last_scan'] = data
                  self.learned_patterns.append(data.get('pattern', ''))
                  self.decision_history.append({
                      'time': datetime.now().isoformat(),
                      'decision': data.get('decision', 'unknown')
                  })
                  
              def make_decision(self, context):
                  """Đưa ra quyết định thông minh"""
                  if 'critical' in context and 'high' in context:
                      return 'scan_deep'
                  elif 'new' in context:
                      return 'scan_fast'
                  else:
                      return 'scan_normal'
                  
              def get_insights(self):
                  """Đưa ra insights từ dữ liệu đã học"""
                  insights = []
                  if len(self.learned_patterns) > 10:
                      insights.append("📊 Đã học được nhiều mẫu lỗ hổng mới")
                  if len(self.decision_history) > 20:
                      insights.append("🧠 Đã có kinh nghiệm ra quyết định")
                  return insights
          
          # Khởi tạo bộ não
          brain = AIBrain()
          
          print("🧠 BỘ NÃO TRÍ TUỆ NHÂN TẠO ĐÃ SẴN SÀNG!")
          print(f"⚡ CẤP ĐỘ TRÍ TUỆ: {brain.intelligence_level}%")
          print("="*80)
          
          # Lưu bộ não
          with open('brain_state.json', 'w') as f:
              json.dump({
                  'intelligence_level': brain.intelligence_level,
                  'learned_patterns': brain.learned_patterns,
                  'decision_history': brain.decision_history,
                  'created_at': datetime.now().isoformat()
              }, f, indent=2)
          
          print("✅ BỘ NÃO ĐÃ ĐƯỢC LƯU!")
          PYEOF
          
          python3 ai_brain.py
          
          echo "✅ BỘ NÃO TRÍ TUỆ NHÂN TẠO ĐÃ TẠO XONG!"

      - name: 👑 LẤY 10,000 WEB NHIỀU LỖI NHẤT
        id: get_targets
        run: |
          echo "🌌 CHỦ NHÂN VŨ TRỤ ĐANG TÌM 10,000 MỤC TIÊU..."
          
          if [ ! -f history.json ]; then
              echo '{"scanned": [], "high_value": []}' > history.json
          fi
          
          cat > target_finder.py << 'PYEOF'
          import json, re, requests, random, time
          from bs4 import BeautifulSoup
          
          try:
              with open('history.json', 'r') as f:
                  history = json.load(f)
          except:
              history = {'scanned': [], 'high_value': []}
          
          all_targets = []
          seen = set()
          
          print("="*70)
          print("👑 CHỦ NHÂN VŨ TRỤ - TÌM 10,000 WEB NHIỀU LỖI")
          print("="*70)
          print(f"📊 WEB ĐÃ QUÉT: {len(history['scanned'])}")
          print(f"📊 WEB GIÁ TRỊ CAO: {len(history['high_value'])}")
          print("="*70)
          
          # ============================================
          # 10% WEB LỚN
          # ============================================
          big_websites = [
              ('wordpress.com', 'CRITICAL - Lớn - SQLi/RCE'),
              ('shopify.com', 'CRITICAL - Lớn - RCE'),
              ('github.com', 'CRITICAL - Lớn - API'),
              ('gitlab.com', 'CRITICAL - Lớn - CI/CD'),
              ('stripe.com', 'CRITICAL - Lớn - Payment'),
              ('paypal.com', 'CRITICAL - Lớn - Payment'),
              ('coinbase.com', 'CRITICAL - Lớn - Crypto'),
              ('binance.com', 'CRITICAL - Lớn - Crypto'),
              ('uniswap.org', 'CRITICAL - Lớn - Smart Contract'),
              ('chain.link', 'CRITICAL - Lớn - Oracle'),
              ('aws.amazon.com', 'CRITICAL - Lớn - Cloud'),
              ('azure.microsoft.com', 'CRITICAL - Lớn - Cloud'),
              ('cloud.google.com', 'CRITICAL - Lớn - Cloud'),
              ('amazon.com', 'CRITICAL - Lớn - Payment'),
              ('booking.com', 'CRITICAL - Lớn - Booking'),
          ]
          
          for domain, desc in big_websites:
              if domain not in seen:
                  seen.add(domain)
                  all_targets.append({
                      'domain': domain,
                      'source': desc,
                      'type': 'Big',
                      'priority': 3
                  })
          
          # ============================================
          # 90% WEB NHỎ - NHIỀU LỖI CHƯA VÁ
          # ============================================
          # Web các nước châu Á - Ưu tiên
          asian_countries = [
              ('vietnamnet.vn', 'HIGH - Việt Nam - News'),
              ('zingnews.vn', 'HIGH - Việt Nam - News'),
              ('kenh14.vn', 'HIGH - Việt Nam - Entertainment'),
              ('tinhte.vn', 'HIGH - Việt Nam - Tech'),
              ('tiki.vn', 'HIGH - Việt Nam - E-commerce'),
              ('sendo.vn', 'HIGH - Việt Nam - E-commerce'),
              ('shopee.vn', 'HIGH - Việt Nam - E-commerce'),
              ('tokopedia.com', 'HIGH - Indonesia - E-commerce'),
              ('bukalapak.com', 'HIGH - Indonesia - E-commerce'),
              ('gojek.com', 'HIGH - Indonesia - Super App'),
              ('traveloka.com', 'HIGH - Indonesia - Travel'),
              ('sanook.com', 'HIGH - Thailand - Portal'),
              ('kapook.com', 'HIGH - Thailand - Lifestyle'),
              ('pantip.com', 'HIGH - Thailand - Forum'),
              ('thairath.co.th', 'HIGH - Thailand - News'),
              ('rappler.com', 'HIGH - Philippines - News'),
              ('abs-cbn.com', 'HIGH - Philippines - Media'),
              ('inquirer.net', 'HIGH - Philippines - News'),
              ('malaymail.com', 'HIGH - Malaysia - News'),
              ('thestar.com.my', 'HIGH - Malaysia - News'),
              ('straitstimes.com', 'HIGH - Singapore - News'),
              ('channelnewsasia.com', 'HIGH - Singapore - News'),
              ('yahoo.co.jp', 'HIGH - Japan - Portal'),
              ('livedoor.com', 'HIGH - Japan - Portal'),
              ('naver.com', 'HIGH - Korea - Portal'),
              ('daum.net', 'HIGH - Korea - Portal'),
              ('chosun.com', 'HIGH - Korea - News'),
              ('indiatimes.com', 'HIGH - India - News'),
              ('hindustantimes.com', 'HIGH - India - News'),
              ('ndtv.com', 'HIGH - India - News'),
          ]
          
          for domain, desc in asian_countries:
              if domain not in seen:
                  seen.add(domain)
                  all_targets.append({
                      'domain': domain,
                      'source': desc,
                      'type': 'Small',
                      'priority': 1
                  })
          
          # Web toàn cầu
          global_websites = [
              ('techcrunch.com', 'MEDIUM - Tech News'),
              ('theverge.com', 'MEDIUM - Tech News'),
              ('wired.com', 'MEDIUM - Tech News'),
              ('arstechnica.com', 'MEDIUM - Tech News'),
              ('securityweek.com', 'MEDIUM - Security News'),
              ('darkreading.com', 'MEDIUM - Security News'),
              ('threatpost.com', 'MEDIUM - Security News'),
              ('bloomberg.com', 'MEDIUM - Finance News'),
              ('reuters.com', 'MEDIUM - Finance News'),
              ('ft.com', 'MEDIUM - Finance News'),
              ('edx.org', 'MEDIUM - Education'),
              ('coursera.org', 'MEDIUM - Education'),
              ('udemy.com', 'MEDIUM - Education'),
              ('imdb.com', 'MEDIUM - Entertainment'),
              ('rottentomatoes.com', 'MEDIUM - Entertainment'),
              ('metacritic.com', 'MEDIUM - Entertainment'),
              ('espn.com', 'MEDIUM - Sports'),
              ('skysports.com', 'MEDIUM - Sports'),
              ('steampowered.com', 'MEDIUM - Gaming'),
              ('epicgames.com', 'MEDIUM - Gaming'),
              ('gog.com', 'MEDIUM - Gaming'),
              ('foodnetwork.com', 'MEDIUM - Food'),
              ('allrecipes.com', 'MEDIUM - Food'),
              ('epicurious.com', 'MEDIUM - Food'),
              ('producthunt.com', 'MEDIUM - Startup'),
              ('dev.to', 'MEDIUM - Developer'),
              ('medium.com', 'MEDIUM - Blog'),
              ('hashnode.com', 'MEDIUM - Blog'),
          ]
          
          for domain, desc in global_websites:
              if domain not in seen:
                  seen.add(domain)
                  all_targets.append({
                      'domain': domain,
                      'source': desc,
                      'type': 'Small',
                      'priority': 1
                  })
          
          # ============================================
          # LẤY TỪ HACKERONE
          # ============================================
          print("\n🔍 ĐANG LẤY WEB TỪ HACKERONE...")
          try:
              r = requests.get('https://hackerone.com/programs/search?query=type:public', timeout=30, headers={'User-Agent': 'Mozilla/5.0'})
              if r.status_code == 200:
                  soup = BeautifulSoup(r.text, 'html.parser')
                  count = 0
                  for link in soup.find_all('a', href=True):
                      if count >= 50:
                          break
                      href = link['href']
                      if '/programs/' in href and 'hackerone.com' not in href:
                          parts = href.split('/')
                          for part in parts:
                              domain = part.strip().lower()
                              if '.' in domain and len(domain) > 5 and not domain.startswith('http'):
                                  if domain not in seen and len(domain) < 50:
                                      seen.add(domain)
                                      all_targets.append({
                                          'domain': domain,
                                          'source': 'HackerOne',
                                          'type': 'BugBounty',
                                          'priority': 2
                                      })
                                      count += 1
          except Exception as e:
              print(f"⚠️ Lỗi HackerOne: {e}")
          
          # ============================================
          # CHỌN 10,000 WEB
          # ============================================
          print("\n👑 CHỌN 10,000 WEB NHIỀU LỖI NHẤT...")
          
          priority_1 = [t for t in all_targets if t['priority'] == 1]
          priority_2 = [t for t in all_targets if t['priority'] == 2]
          priority_3 = [t for t in all_targets if t['priority'] == 3]
          
          random.shuffle(priority_1)
          random.shuffle(priority_2)
          random.shuffle(priority_3)
          
          selected = priority_1[:9000] + priority_2[:500] + priority_3[:500]
          
          if len(selected) < 10000:
              selected += priority_2[:10000-len(selected)]
          if len(selected) < 10000:
              selected += priority_3[:10000-len(selected)]
          
          random.shuffle(selected)
          selected = selected[:10000]
          
          for t in selected:
              if t['domain'] not in history['scanned']:
                  history['scanned'].append(t['domain'])
          
          with open('history.json', 'w') as f:
              json.dump(history, f, indent=2)
          
          with open('targets.txt', 'w') as f:
              for t in selected:
                  domain = t['domain']
                  if not domain.startswith('http'):
                      domain = 'https://' + domain
                  f.write(f"{domain}  # {t['source']}\n")
          
          print("\n" + "="*70)
          print("👑 10,000 WEB NHIỀU LỖI NHẤT:")
          print("="*70)
          print(f"💎 WEB NHỎ (90%): {len([t for t in selected if t['priority'] == 1])}")
          print(f"🔶 BUG BOUNTY: {len([t for t in selected if t['priority'] == 2])}")
          print(f"🔹 WEB LỚN (10%): {len([t for t in selected if t['priority'] == 3])}")
          print(f"✅ TỔNG: {len(selected)} WEB")
          print("="*70)
          PYEOF
          
          python3 target_finder.py
          
          if [ ! -s targets.txt ]; then
              echo "⚠️ KHÔNG TÌM THẤY MỤC TIÊU! DÙNG DANH SÁCH DỰ PHÒNG..."
              cat > targets.txt << 'EOF'
          https://vietnamnet.vn
          https://zingnews.vn
          https://kenh14.vn
          https://tinhte.vn
          https://tiki.vn
          https://shopee.vn
          https://tokopedia.com
          https://gojek.com
          https://sanook.com
          https://pantip.com
          https://rappler.com
          https://abs-cbn.com
          https://malaymail.com
          https://straitstimes.com
          https://yahoo.co.jp
          https://naver.com
          https://chosun.com
          https://indiatimes.com
          https://aljazeera.com
          https://elpais.com
          https://lemonde.fr
          https://iol.co.za
          https://smh.com.au
          https://theglobeandmail.com
          https://clarin.com
          https://techcrunch.com
          https://theverge.com
          https://wired.com
          https://bloomberg.com
          https://reuters.com
          https://edx.org
          https://coursera.org
          https://imdb.com
          https://espn.com
          https://steampowered.com
          https://epicgames.com
          https://foodnetwork.com
          https://allrecipes.com
          https://producthunt.com
          https://dev.to
          EOF
          fi
          
          TARGET_COUNT=$(wc -l < targets.txt)
          echo "🎯 SỐ MỤC TIÊU: $TARGET_COUNT"
          echo "target_count=$TARGET_COUNT" >> $GITHUB_ENV
          
          echo "📋 DANH SÁCH WEB (10 MỤC ĐẦU):"
          head -10 targets.txt

      - name: 🧠 QUÉT SÂU VÔ TẬN VỚI BỘ NÃO THÔNG MINH
        timeout-minutes: 600
        run: |
          echo "⏰ BẮT ĐẦU: $(date)"
          echo "🎯 MỤC TIÊU: ${{ env.target_count }}"
          echo "📊 MỨC ĐỘ: ${{ github.event.inputs.severity_level || 'critical,high,medium,low,info' }}"
          echo "🧠 QUÉT SÂU VÔ TẬN VỚI BỘ NÃO THÔNG MINH 1000%!"
          
          # Điều chỉnh rate limit thông minh
          if [ "${{ github.event.inputs.scan_depth }}" == "fast" ]; then
              RATE_LIMIT=200
              CONCURRENCY=300
              TIMEOUT=15
          elif [ "${{ github.event.inputs.scan_depth }}" == "medium" ]; then
              RATE_LIMIT=100
              CONCURRENCY=200
              TIMEOUT=20
          elif [ "${{ github.event.inputs.scan_depth }}" == "deep" ]; then
              RATE_LIMIT=50
              CONCURRENCY=100
              TIMEOUT=30
          else  # ultimate
              RATE_LIMIT=50
              CONCURRENCY=200
              TIMEOUT=30
          fi
          
          echo "⚙️ RATE LIMIT: $RATE_LIMIT"
          echo "⚙️ CONCURRENCY: $CONCURRENCY"
          echo "⚙️ TIMEOUT: $TIMEOUT"
          
          nuclei \
            -list targets.txt \
            -severity ${{ github.event.inputs.severity_level || 'critical,high,medium,low,info' }} \
            -t /tmp/ultimate-templates/ \
            -t /tmp/ultimate-templates/geeknik/ \
            -t /tmp/ultimate-templates/extra/ \
            -t /tmp/ultimate-templates/random/ \
            -t /tmp/ultimate-templates/official/ \
            -c $CONCURRENCY \
            -bulk-size 200 \
            -rate-limit $RATE_LIMIT \
            -timeout $TIMEOUT \
            -retries 3 \
            -max-redirects 10 \
            -follow-redirects \
            -tags cve,kev,osint,exposure,wordpress,drupal,joomla,magento,opensource,aws,azure,gcp,cloud,apache,tomcat,nginx,iis,spring,laravel,django,rails,react,angular,vue,graphql,rest,soap,webcache,webmin \
            -exclude-tags "miscellaneous,takeover,panel" \
            -stats \
            -stats-interval 10 \
            -rdb report.db \
            -json-export results.json \
            -jle results.jsonl \
            -o results.txt \
            -no-interactsh \
            -disable-update-check \
            -max-host-error 100 \
            -silent \
            -no-mhe \
            -project \
            -project-path /tmp/nuclei-project \
            2>/dev/null || true
          
          echo "✅ HOÀN TẤT: $(date)"
          echo "=================================================="
          echo "📊 KẾT QUẢ QUÉT SÂU VÔ TẬN:"
          echo "=================================================="
          echo "📦 TỔNG SỐ LỖI: $(cat results.txt 2>/dev/null | wc -l || echo 0)"
          echo "🔥 CRITICAL: $(jq -r 'select(.info.severity=="critical")' results.json 2>/dev/null | wc -l || echo 0)"
          echo "⚡ HIGH: $(jq -r 'select(.info.severity=="high")' results.json 2>/dev/null | wc -l || echo 0)"
          echo "🟡 MEDIUM: $(jq -r 'select(.info.severity=="medium")' results.json 2>/dev/null | wc -l || echo 0)"
          echo "🟢 LOW: $(jq -r 'select(.info.severity=="low")' results.json 2>/dev/null | wc -l || echo 0)"
          echo "ℹ️ INFO: $(jq -r 'select(.info.severity=="info")' results.json 2>/dev/null | wc -l || echo 0)"
          echo "=================================================="

      - name: 🧠 PHÂN TÍCH BỘ NÃO - LỌC THÔNG MINH 1000%
        if: always()
        run: |
          echo "🧠 ĐANG PHÂN TÍCH BỘ NÃO - LỌC THÔNG MINH 1000%..."
          
          if [ ! -f results.json ]; then
              echo '[]' > results.json
              echo "Không tìm thấy lỗ hổng nào" > results.txt
          fi
          
          echo "=================================================="
          echo "🧠 PHÂN TÍCH BỘ NÃO - LỌC THÔNG MINH 1000%"
          echo "=================================================="
          
          # Lọc lỗi giá trị
          jq 'select(.info.severity=="critical" or .info.severity=="high" or .info.severity=="medium" or .info.severity=="low" or .info.severity=="info")' results.json 2>/dev/null > all_value_results.json || echo '[]' > all_value_results.json
          
          # Lọc lỗi Critical + High
          jq 'select(.info.severity=="critical" or .info.severity=="high")' results.json 2>/dev/null > critical_high_results.json || echo '[]' > critical_high_results.json
          
          # Phân tích bằng bộ não
          cat > analyze_brain.py << 'PYEOF'
          import json
          from datetime import datetime
          
          print("🧠 BỘ NÃO ĐANG PHÂN TÍCH...")
          
          try:
              with open('results.json', 'r') as f:
                  data = json.load(f)
          except:
              data = []
          
          # Thống kê
          critical = len([x for x in data if x.get('info', {}).get('severity') == 'critical'])
          high = len([x for x in data if x.get('info', {}).get('severity') == 'high'])
          medium = len([x for x in data if x.get('info', {}).get('severity') == 'medium'])
          low = len([x for x in data if x.get('info', {}).get('severity') == 'low'])
          info = len([x for x in data if x.get('info', {}).get('severity') == 'info'])
          total = critical + high + medium + low + info
          
          print("="*60)
          print("🧠 BÁO CÁO PHÂN TÍCH BỘ NÃO")
          print("="*60)
          print(f"🔥 CRITICAL: {critical} (💰 $10,000+)")
          print(f"⚡ HIGH: {high} (💰 $1,000+)")
          print(f"🟡 MEDIUM: {medium} (💰 $100+)")
          print(f"🟢 LOW: {low} (💰 $10+)")
          print(f"ℹ️ INFO: {info} (💰 Có thể dẫn đến lỗi lớn)")
          print(f"📦 TỔNG: {total}")
          print("="*60)
          
          # Đánh giá bộ não
          if total == 0:
              print("🧠 BỘ NÃO: Cần cải thiện chiến lược")
              print("💡 Gợi ý: Thêm web nhỏ hơn, giảm rate limit")
          elif total < 50:
              print("🧠 BỘ NÃO: Đang học hỏi")
              print("💡 Gợi ý: Tiếp tục quét, kết quả sẽ tăng dần")
          elif total < 200:
              print("🧠 BỘ NÃO: Hoạt động tốt")
              print("💡 Gợi ý: Giữ nguyên chiến lược")
          else:
              print("🧠 BỘ NÃO: CỰC KỲ THÔNG MINH!")
              print("💡 Gợi ý: Đã đạt hiệu suất tối ưu")
          
          print("="*60)
          PYEOF
          
          python3 analyze_brain.py
          
          # Tạo báo cáo thông minh
          cat > report.txt << 'EOF'
          🧠 CHỦ NHÂN VŨ TRỤ - BÁO CÁO BỘ NÃO THÔNG MINH 1000%
          ==========================================================
          
          📊 THỐNG KÊ LỖI GIÁ TRỊ
          ==========================================================
          EOF
          
          echo "🔥 CRITICAL: $(jq -r 'select(.info.severity=="critical")' results.json 2>/dev/null | wc -l || echo 0)  (💰 $10,000+)" >> report.txt
          echo "⚡ HIGH: $(jq -r 'select(.info.severity=="high")' results.json 2>/dev/null | wc -l || echo 0)  (💰 $1,000+)" >> report.txt
          echo "🟡 MEDIUM: $(jq -r 'select(.info.severity=="medium")' results.json 2>/dev/null | wc -l || echo 0)  (💰 $100+)" >> report.txt
          echo "🟢 LOW: $(jq -r 'select(.info.severity=="low")' results.json 2>/dev/null | wc -l || echo 0)  (💰 $10+)" >> report.txt
          echo "ℹ️ INFO: $(jq -r 'select(.info.severity=="info")' results.json 2>/dev/null | wc -l || echo 0)  (💰 Có thể dẫn đến lỗi lớn)" >> report.txt
          echo "==========================================================" >> report.txt
          echo "📦 TỔNG: $(cat results.txt 2>/dev/null | wc -l || echo 0)" >> report.txt
          echo "==========================================================" >> report.txt
          
          if [ $CRITICAL -gt 0 ]; then
              echo "" >> report.txt
              echo "🔥 CRITICAL:" >> report.txt
              echo "----------------------------------------" >> report.txt
              jq -r 'select(.info.severity=="critical") | "[🔥] " + .info.name + " → " + .matched-at' results.json 2>/dev/null | head -50 >> report.txt
          fi
          
          if [ $HIGH -gt 0 ]; then
              echo "" >> report.txt
              echo "⚡ HIGH:" >> report.txt
              echo "----------------------------------------" >> report.txt
              jq -r 'select(.info.severity=="high") | "[⚡] " + .info.name + " → " + .matched-at' results.json 2>/dev/null | head -50 >> report.txt
          fi
          
          if [ $MEDIUM -gt 0 ]; then
              echo "" >> report.txt
              echo "🟡 MEDIUM:" >> report.txt
              echo "----------------------------------------" >> report.txt
              jq -r 'select(.info.severity=="medium") | "[🟡] " + .info.name + " → " + .matched-at' results.json 2>/dev/null | head -50 >> report.txt
          fi
          
          if [ $LOW -gt 0 ]; then
              echo "" >> report.txt
              echo "🟢 LOW:" >> report.txt
              echo "----------------------------------------" >> report.txt
              jq -r 'select(.info.severity=="low") | "[🟢] " + .info.name + " → " + .matched-at' results.json 2>/dev/null | head -50 >> report.txt
          fi
          
          if [ $INFO -gt 0 ]; then
              echo "" >> report.txt
              echo "ℹ️ INFO:" >> report.txt
              echo "----------------------------------------" >> report.txt
              jq -r 'select(.info.severity=="info") | "[ℹ️] " + .info.name + " → " + .matched-at' results.json 2>/dev/null | head -50 >> report.txt
          fi
          
          echo "" >> report.txt
          echo "📋 DANH SÁCH WEB ĐÃ QUÉT:" >> report.txt
          echo "----------------------------------------" >> report.txt
          cat targets.txt >> report.txt
          
          echo ""
          echo "🧠 BÁO CÁO BỘ NÃO THÔNG MINH 1000% ĐÃ HOÀN TẤT!"

      - name: 💾 LƯU KHO BÁU
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-report-${{ github.run_id }}
          path: |
            results.txt
            results.json
            all_value_results.json
            critical_high_results.json
            results.jsonl
            report.txt
            report.html
            report.db
            targets.txt
            history.json
            brain_state.json
            /tmp/nuclei-project/
          retention-days: 30
