name: "Nuclei Engine 24/7 Pro"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  nuclei-scan:
    runs-on: ubuntu-latest
    container:
      image: projectdiscovery/nuclei:latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Nuclei Scan
        run: |
          echo "START SCAN: $(date)"
          echo "TARGETS: $(cat targets.txt | wc -l) websites"
          echo ""
          
          nuclei -list targets.txt \
            -severity critical,high,medium \
            -c 30 \
            -rate-limit 100 \
            -bulk-size 20 \
            -timeout 20 \
            -retries 3 \
            -stats \
            -json-export results.json \
            -o results.txt \
            -silent

      - name: Show Results
        if: always()
        run: |
          echo ""
          echo "========== RESULTS =========="
          echo ""
          
          if [ -f results.txt ]; then
            echo "📦 TOTAL VULNS: $(cat results.txt | wc -l)"
            echo ""
            echo "📋 DETAILS:"
            cat results.txt
          else
            echo "✅ NO VULNS FOUND"
          fi
          
          echo ""
          echo "========== END =========="

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nuclei-report
          path: |
            results.txt
            results.json
          retention-days: 7
