name: "Nuclei - Tự Xác Minh Thông Minh"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  nuclei-scan:
    runs-on: ubuntu-latest
    container:
      image: projectdiscovery/nuclei:latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: ⚡ QUÉT VÀ TỰ XÁC MINH
        run: |
          echo "============================================================"
          echo "🧠 NUCLEI - TỰ ĐỘNG QUÉT & XÁC MINH LỖ HỔNG"
          echo "============================================================"
          echo "START TIME: $(date)"
          echo ""

          # === LẦN 1: QUÉT NHANH ===
          echo "📥 LẦN 1: QUÉT TÌM LỖI"
          echo "------------------------------------------------------------"
          nuclei -list targets.txt \
            -severity critical,high,medium \
            -c 40 \
            -rate-limit 120 \
            -bulk-size 25 \
            -timeout 20 \
            -retries 3 \
            -json-export raw_results.json \
            -o raw_results.txt \
            -silent

          echo "✅ LẦN 1 HOÀN TẤT: $(date)"

          # === LẦN 2: TỰ ĐỘNG XÁC MINH ===
          echo ""
          echo "============================================================"
          echo "🔬 LẦN 2: TỰ ĐỘNG XÁC MINH LỖI"
          echo "============================================================"
          echo ""

          echo "📋 BÁO CÁO LỖI ĐÃ XÁC MINH:" > verified_report.txt
          echo "========================================================================" >> verified_report.txt
          echo "" >> verified_report.txt

          if [ -f raw_results.txt ] && [ -s raw_results.txt ]; then
            echo "🔍 ĐANG XÁC MINH TỪNG LỖI..."
            echo ""
            
            VERIFIED_COUNT=0
            FALSE_COUNT=0
            
            while IFS= read -r line; do
              if [ -n "$line" ]; then
                URL=$(echo "$line" | grep -oP 'https?://[^ ]+' | head -1)
                TEMPLATE=$(echo "$line" | grep -oP '\[[^]]+\]' | head -1 | tr -d '[]')
                SEVERITY=$(echo "$line" | grep -oP '\[[^]]+\]' | sed -n '2p' | tr -d '[]' || echo "unknown")
                
                if [ -n "$URL" ] && [ -n "$TEMPLATE" ]; then
                  echo "🔬 ĐANG XÁC MINH: $TEMPLATE trên $URL"
                  
                  # === XÁC MINH CHI TIẾT ===
                  # 1. Lấy status code
                  STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" 2>/dev/null || echo "000")
                  
                  # 2. Lấy header
                  HEADER=$(curl -s -I --max-time 10 "$URL" 2>/dev/null | head -5)
                  
                  # 3. Lấy nội dung (20 dòng)
                  BODY=$(curl -s --max-time 10 "$URL" 2>/dev/null | head -20)
                  
                  # 4. Phân tích
                  if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "403" ]; then
                    # Kiểm tra nội dung
                    if echo "$BODY" | grep -qiE "error|warning|exception|stack trace|fatal|critical|deprecated|sql|mysql|postgres|mongodb|password|secret|key|token|api"; then
                      echo "✅ [$SEVERITY] $TEMPLATE" >> verified_report.txt
                      echo "   → URL: $URL" >> verified_report.txt
                      echo "   → HTTP $STATUS - ĐÃ XÁC MINH (Có dấu hiệu lỗi)" >> verified_report.txt
                      if echo "$HEADER" | grep -qiE "server|powered-by|x-powered-by"; then
                        SERVER_INFO=$(echo "$HEADER" | grep -iE "server|powered-by" | head -1)
                        echo "   → Server: $SERVER_INFO" >> verified_report.txt
                      fi
                      echo "   → Trạng thái: 🔴 CHƯA VÁ - Cần báo cáo ngay!" >> verified_report.txt
                      echo "" >> verified_report.txt
                      VERIFIED_COUNT=$((VERIFIED_COUNT + 1))
                    else
                      echo "✅ [$SEVERITY] $TEMPLATE" >> verified_report.txt
                      echo "   → URL: $URL" >> verified_report.txt
                      echo "   → HTTP $STATUS - ĐÃ XÁC MINH (Trang tồn tại)" >> verified_report.txt
                      echo "   → Trạng thái: 🟡 CẦN KIỂM TRA THỦ CÔNG" >> verified_report.txt
                      echo "" >> verified_report.txt
                      VERIFIED_COUNT=$((VERIFIED_COUNT + 1))
                    fi
                  else
                    echo "❌ [$SEVERITY] $TEMPLATE" >> verified_report.txt
                    echo "   → URL: $URL" >> verified_report.txt
                    echo "   → HTTP $STATUS - KHÔNG XÁC MINH" >> verified_report.txt
                    echo "   → Trạng thái: 🟢 ĐÃ VÁ HOẶC FALSE POSITIVE" >> verified_report.txt
                    echo "" >> verified_report.txt
                    FALSE_COUNT=$((FALSE_COUNT + 1))
                  fi
                fi
              fi
            done < raw_results.txt
            
            echo ""
            echo "============================================================"
            echo "📊 TỔNG KẾT XÁC MINH:"
            echo "✅ LỖI ĐÃ XÁC MINH (CÒN HIỆU LỰC): $VERIFIED_COUNT"
            echo "❌ LỖI KHÔNG XÁC MINH (ĐÃ VÁ/FALSE): $FALSE_COUNT"
            echo "============================================================"
            
          else
            echo "⚠️ KHÔNG TÌM THẤY LỖI NÀO ĐỂ XÁC MINH" >> verified_report.txt
          fi
          
          echo "========================================================================" >> verified_report.txt

      - name: 📄 TẠO BÁO CÁO CUỐI CÙNG
        if: always()
        run: |
          echo ""
          echo "============================================================"
          echo "📄 TẠO BÁO CÁO LỖI ĐÃ XÁC MINH"
          echo "============================================================"
          echo ""

          cat verified_report.txt > FINAL_REPORT.txt
          echo "" >> FINAL_REPORT.txt
          echo "============================================================" >> FINAL_REPORT.txt
          echo "📅 THỜI GIAN HOÀN TẤT: $(date)" >> FINAL_REPORT.txt
          echo "============================================================" >> FINAL_REPORT.txt
          echo "" >> FINAL_REPORT.txt
          echo "📋 HƯỚNG DẪN BÁO CÁO:" >> FINAL_REPORT.txt
          echo "1. Lỗi có '🟢 ĐÃ VÁ' → KHÔNG BÁO CÁO" >> FINAL_REPORT.txt
          echo "2. Lỗi có '🟡 CẦN KIỂM TRA' → Kiểm tra thủ công rồi báo cáo" >> FINAL_REPORT.txt
          echo "3. Lỗi có '🔴 CHƯA VÁ' → BÁO CÁO NGAY!" >> FINAL_REPORT.txt
          echo "" >> FINAL_REPORT.txt
          echo "📌 GỬI BÁO CÁO LÊN: HackerOne, Bugcrowd, Immunefi" >> FINAL_REPORT.txt

          echo "✅ BÁO CÁO ĐÃ TẠO: FINAL_REPORT.txt"
          cat FINAL_REPORT.txt

      - name: 💾 LƯU KẾT QUẢ
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nuclei-verified-report-${{ github.run_id }}
          path: |
            raw_results.txt
            raw_results.json
            verified_report.txt
            FINAL_REPORT.txt
          retention-days: 30
