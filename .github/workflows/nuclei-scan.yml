name: "👑 CHỦ NHÂN VŨ TRỤ - SĂN LỖI XỊN"

on:
  workflow_dispatch:
    inputs:
      severity_level:
        description: '📊 MỨC ĐỘ LỖ HỔNG'
        required: false
        default: 'critical,high,medium'
        type: choice
        options:
          - critical,high
          - critical,high,medium
          - critical,high,medium,low
          - critical,high,medium,low,info
  schedule:
    - cron: '0 */3 * * *'

jobs:
  ultimate-scan:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 TẢI MÃ NGUỒN
        uses: actions/checkout@v4

      - name: 📦 CÀI ĐẶT CÔNG CỤ
        run: |
          echo "🔥 ĐANG CÀI ĐẶT CÔNG CỤ..."
          
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            jq curl git python3 python3-pip \
            massdns dnsrecon dnsenum \
            nmap ffuf unzip wget \
            && sudo rm -rf /var/lib/apt/lists/*
          
          echo "📥 ĐANG TẢI NUCLEI..."
          sudo snap install go --classic
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          sudo cp ~/go/bin/nuclei /usr/local/bin/
          nuclei -version || echo "⚠️ Lỗi cài nuclei"
          
          pip3 install -q requests beautifulsoup4 lxml
          
          nuclei -update-templates -silent
          nuclei -templates-version
          
          mkdir -p /tmp/ultimate-templates
          
          echo "📥 ĐANG TẢI TEMPLATE..."
          git clone --depth 1 -q https://github.com/geeknik/nuclei-templates.git /tmp/ultimate-templates/geeknik 2>/dev/null || true
          git clone --depth 1 -q https://github.com/notnotnotveg/nuclei-templates.git /tmp/ultimate-templates/extra 2>/dev/null || true
          git clone --depth 1 -q https://github.com/random-robbie/nuclei-templates.git /tmp/ultimate-templates/random 2>/dev/null || true
          git clone --depth 1 -q https://github.com/projectdiscovery/nuclei-templates.git /tmp/ultimate-templates/official 2>/dev/null || true
          
          echo "✅ CÀI ĐẶT HOÀN TẤT!"

      - name: 👑 LẤY 20 WEB NHIỀU LỖI NHẤT
        id: get_targets
        run: |
          echo "🌌 CHỦ NHÂN VŨ TRỤ ĐANG TÌM MỤC TIÊU..."
          
          if [ ! -f history.json ]; then
              echo '{"scanned": [], "high_value": []}' > history.json
          fi
          
          cat > target_finder.py << 'PYEOF'
          import json, re, requests, random, time
          from bs4 import BeautifulSoup
          
          try:
              with open('history.json', 'r') as f:
                  history = json.load(f)
          except:
              history = {'scanned': [], 'high_value': []}
          
          all_targets = []
          seen = set()
          
          print("="*70)
          print("👑 CHỦ NHÂN VŨ TRỤ - TÌM WEB NHIỀU LỖI")
          print("="*70)
          print(f"📊 WEB ĐÃ QUÉT: {len(history['scanned'])}")
          print(f"📊 WEB GIÁ TRỊ CAO: {len(history['high_value'])}")
          print("="*70)
          
          # ============================================
          # DANH SÁCH WEB GIÁ TRỊ CAO - LUÔN CÓ
          # ============================================
          high_value_websites = [
              # CMS - Lỗi plugin/extension
              ('wordpress.com', 'CRITICAL - SQLi/RCE plugin'),
              ('joomla.org', 'CRITICAL - SQLi/RCE extension'),
              ('drupal.org', 'CRITICAL - RCE module'),
              ('magento.com', 'CRITICAL - SQLi/RCE'),
              ('shopify.com', 'CRITICAL - RCE theme'),
              
              # Framework - Lỗi core
              ('laravel.com', 'CRITICAL - RCE core'),
              ('djangoproject.com', 'CRITICAL - RCE core'),
              ('rubyonrails.org', 'CRITICAL - RCE core'),
              ('spring.io', 'CRITICAL - RCE core'),
              
              # Payment - Lỗi logic tiền
              ('stripe.com', 'CRITICAL - Payment bypass'),
              ('paypal.com', 'CRITICAL - Payment logic'),
              ('square.com', 'CRITICAL - Payment logic'),
              
              # Crypto - Lỗi smart contract
              ('coinbase.com', 'CRITICAL - Crypto theft'),
              ('binance.com', 'CRITICAL - Withdraw bypass'),
              ('kraken.com', 'CRITICAL - Trading logic'),
              ('uniswap.org', 'CRITICAL - Smart contract drain'),
              ('chain.link', 'CRITICAL - Oracle manipulation'),
              ('aave.com', 'CRITICAL - Lending logic'),
              ('compound.finance', 'CRITICAL - Lending logic'),
              ('gmx.io', 'CRITICAL - Trading logic'),
              ('morpho.org', 'CRITICAL - Lending logic'),
              ('injective.com', 'CRITICAL - Trading logic'),
              ('sky.money', 'CRITICAL - Stablecoin logic'),
              ('layerzero.com', 'CRITICAL - Cross-chain'),
              ('wormhole.com', 'CRITICAL - Cross-chain'),
              
              # E-commerce - Lỗi logic
              ('amazon.com', 'CRITICAL - Payment bypass'),
              ('ebay.com', 'CRITICAL - Auction logic'),
              ('alibaba.com', 'CRITICAL - Trade logic'),
              
              # Travel - Lỗi booking
              ('booking.com', 'CRITICAL - Booking bypass'),
              ('expedia.com', 'CRITICAL - Booking logic'),
              ('airbnb.com', 'CRITICAL - Reservation logic'),
              ('tripadvisor.com', 'CRITICAL - Review logic'),
              
              # Social - Lỗi API
              ('reddit.com', 'CRITICAL - API logic'),
              ('discord.com', 'CRITICAL - API bypass'),
              ('telegram.org', 'CRITICAL - Bot takeover'),
              ('slack.com', 'CRITICAL - Integration bypass'),
              
              # Developer - Lỗi API
              ('github.com', 'CRITICAL - API bypass'),
              ('gitlab.com', 'CRITICAL - CI/CD escape'),
              ('bitbucket.org', 'CRITICAL - Pipeline escape'),
              
              # Cloud - Lỗi config
              ('aws.amazon.com', 'CRITICAL - Cloud escape'),
              ('azure.microsoft.com', 'CRITICAL - Cloud escape'),
              ('cloud.google.com', 'CRITICAL - Cloud escape'),
              ('digitalocean.com', 'CRITICAL - Container escape'),
              
              # News - Lỗi CMS
              ('cnn.com', 'CRITICAL - CMS logic'),
              ('bbc.com', 'CRITICAL - CMS logic'),
              ('nytimes.com', 'CRITICAL - Paywall logic'),
              ('theguardian.com', 'CRITICAL - Comment logic'),
              
              # Blockchain
              ('near.org', 'CRITICAL - Blockchain logic'),
              ('aptosfoundation.org', 'CRITICAL - Blockchain logic'),
              ('pyth.network', 'CRITICAL - Oracle logic'),
          ]
          
          high_value_domains = [d for d, _ in high_value_websites]
          for domain, desc in high_value_websites:
              if domain not in seen:
                  seen.add(domain)
                  all_targets.append({
                      'domain': domain,
                      'source': desc,
                      'type': 'HighValue',
                      'priority': 1
                  })
                  if domain not in history['high_value']:
                      history['high_value'].append(domain)
          
          # ============================================
          # LẤY TỪ HACKERONE
          # ============================================
          print("\n🔍 ĐANG LẤY WEB TỪ HACKERONE...")
          try:
              r = requests.get('https://hackerone.com/programs/search?query=type:public', timeout=15, headers={'User-Agent': 'Mozilla/5.0'})
              if r.status_code == 200:
                  soup = BeautifulSoup(r.text, 'html.parser')
                  count = 0
                  for link in soup.find_all('a', href=True):
                      if count >= 15:
                          break
                      href = link['href']
                      if '/programs/' in href and 'hackerone.com' not in href:
                          parts = href.split('/')
                          for part in parts:
                              domain = part.strip().lower()
                              if '.' in domain and len(domain) > 5 and not domain.startswith('http'):
                                  if domain not in seen and len(domain) < 50:
                                      is_high = domain in high_value_domains
                                      seen.add(domain)
                                      all_targets.append({
                                          'domain': domain,
                                          'source': 'HackerOne' + (' 💎' if is_high else ''),
                                          'type': 'BugBounty',
                                          'priority': 1 if is_high else 3
                                      })
                                      count += 1
          except Exception as e:
              print(f"⚠️ Lỗi HackerOne: {e}")
          
          # ============================================
          # LẤY TỪ BUGCROWD
          # ============================================
          print("\n🔍 ĐANG LẤY WEB TỪ BUGCROWD...")
          try:
              r = requests.get('https://bugcrowd.com/programs', timeout=15, headers={'User-Agent': 'Mozilla/5.0'})
              if r.status_code == 200:
                  soup = BeautifulSoup(r.text, 'html.parser')
                  count = 0
                  for item in soup.find_all(['a', 'div'], class_=True):
                      if count >= 15:
                          break
                      text = item.text.strip()
                      if '.' in text and len(text) > 5 and ' ' not in text:
                          domain = text.lower().strip()
                          if domain and domain not in seen and len(domain) < 50:
                              if not any(x in domain for x in ['bugcrowd', 'hackerone', 'immunefi']):
                                  is_high = domain in high_value_domains
                                  seen.add(domain)
                                  all_targets.append({
                                      'domain': domain,
                                      'source': 'Bugcrowd' + (' 💎' if is_high else ''),
                                      'type': 'BugBounty',
                                      'priority': 1 if is_high else 3
                                  })
                                  count += 1
          except Exception as e:
              print(f"⚠️ Lỗi Bugcrowd: {e}")
          
          # ============================================
          # LẤY TỪ IMMUNEFI
          # ============================================
          print("\n🔍 ĐANG LẤY WEB TỪ IMMUNEFI...")
          try:
              r = requests.get('https://immunefi.com/explore/', timeout=15, headers={'User-Agent': 'Mozilla/5.0'})
              if r.status_code == 200:
                  soup = BeautifulSoup(r.text, 'html.parser')
                  count = 0
                  for link in soup.find_all('a', href=True):
                      if count >= 15:
                          break
                      href = link['href']
                      if '/bounty/' in href and 'immunefi.com' not in href:
                          parts = href.split('/')
                          for part in parts:
                              domain = part.strip().lower()
                              if '.' in domain and len(domain) > 5:
                                  if domain not in seen:
                                      is_high = domain in high_value_domains
                                      seen.add(domain)
                                      all_targets.append({
                                          'domain': domain,
                                          'source': 'Immunefi' + (' 💎' if is_high else ''),
                                          'type': 'Web3',
                                          'priority': 1 if is_high else 2
                                      })
                                      count += 1
          except Exception as e:
              print(f"⚠️ Lỗi Immunefi: {e}")
          
          # ============================================
          # CHỌN 20 WEB NHIỀU LỖI NHẤT
          # ============================================
          print("\n👑 CHỌN 20 WEB NHIỀU LỖI NHẤT...")
          
          priority_1 = [t for t in all_targets if t['priority'] == 1]
          priority_2 = [t for t in all_targets if t['priority'] == 2]
          priority_3 = [t for t in all_targets if t['priority'] == 3]
          
          random.shuffle(priority_1)
          random.shuffle(priority_2)
          random.shuffle(priority_3)
          
          selected = priority_1[:12] + priority_2[:5] + priority_3[:3]
          
          if len(selected) < 20:
              selected += priority_2[:20-len(selected)]
          if len(selected) < 20:
              selected += priority_3[:20-len(selected)]
          
          random.shuffle(selected)
          selected = selected[:20]
          
          # Cập nhật lịch sử
          for t in selected:
              if t['domain'] not in history['scanned']:
                  history['scanned'].append(t['domain'])
          
          with open('history.json', 'w') as f:
              json.dump(history, f, indent=2)
          
          # Ghi file target
          with open('targets.txt', 'w') as f:
              for t in selected:
                  domain = t['domain']
                  if not domain.startswith('http'):
                      domain = 'https://' + domain
                  f.write(f"{domain}  # {t['source']}\n")
          
          print("\n" + "="*70)
          print("👑 20 WEB NHIỀU LỖI NHẤT:")
          print("="*70)
          for i, t in enumerate(selected, 1):
              icon = "💎" if t['priority'] == 1 else ("🔶" if t['priority'] == 2 else "🔹")
              print(f"{i:2}. {icon} {t['domain']:35} → {t['source']}")
          print("="*70)
          print(f"✅ TỔNG: {len(selected)} WEB")
          print(f"💎 WEB GIÁ TRỊ CAO: {len([t for t in selected if t['priority'] == 1])}")
          print(f"🔶 WEB3: {len([t for t in selected if t['priority'] == 2])}")
          print(f"🔹 BUG BOUNTY: {len([t for t in selected if t['priority'] == 3])}")
          print("="*70)
          PYEOF
          
          python3 target_finder.py
          
          if [ ! -s targets.txt ]; then
              echo "⚠️ KHÔNG TÌM THẤY MỤC TIÊU! DÙNG DANH SÁCH DỰ PHÒNG..."
              cat > targets.txt << 'EOF'
          https://wordpress.com
          https://joomla.org
          https://drupal.org
          https://magento.com
          https://shopify.com
          https://laravel.com
          https://djangoproject.com
          https://rubyonrails.org
          https://spring.io
          https://stripe.com
          https://paypal.com
          https://coinbase.com
          https://binance.com
          https://uniswap.org
          https://chain.link
          https://aave.com
          https://github.com
          https://gitlab.com
          https://aws.amazon.com
          https://azure.microsoft.com
          EOF
          fi
          
          TARGET_COUNT=$(wc -l < targets.txt)
          echo "🎯 SỐ MỤC TIÊU: $TARGET_COUNT"
          echo "target_count=$TARGET_COUNT" >> $GITHUB_ENV
          
          echo "📋 DANH SÁCH WEB:"
          cat targets.txt

      - name: 🔍 QUÉT XUYÊN LỤC ĐỊA
        timeout-minutes: 120
        run: |
          echo "⏰ BẮT ĐẦU: $(date)"
          echo "🎯 MỤC TIÊU: ${{ env.target_count }}"
          echo "📊 MỨC ĐỘ: ${{ github.event.inputs.severity_level || 'critical,high,medium' }}"
          
          nuclei \
            -list targets.txt \
            -severity ${{ github.event.inputs.severity_level || 'critical,high,medium' }} \
            -t /tmp/ultimate-templates/ \
            -t /tmp/ultimate-templates/geeknik/ \
            -t /tmp/ultimate-templates/extra/ \
            -t /tmp/ultimate-templates/random/ \
            -t /tmp/ultimate-templates/official/ \
            -c 150 \
            -bulk-size 50 \
            -rate-limit 100 \
            -timeout 15 \
            -retries 2 \
            -max-redirects 5 \
            -follow-redirects \
            -scan-all-ips \
            -tags cve,kev,osint,exposure,wordpress,drupal,joomla,magento,opensource,aws,azure,gcp,cloud,apache,tomcat,nginx,iis,spring,laravel,django,rails,react,angular,vue,graphql,rest,soap,webcache,webmin \
            -exclude-tags "miscellaneous,takeover,panel" \
            -stats \
            -stats-interval 10 \
            -rdb report.db \
            -json-export results.json \
            -jle results.jsonl \
            -o results.txt \
            -no-interactsh \
            -disable-update-check \
            -max-host-error 20 \
            -verify \
            -silent \
            -no-mhe \
            -project \
            -project-path /tmp/nuclei-project \
            2>/dev/null || true
          
          echo "✅ HOÀN TẤT: $(date)"

      - name: 📊 LỌC LỖI CÓ GIÁ TRỊ
        if: always()
        run: |
          echo "🔥 ĐANG LỌC LỖI CÓ GIÁ TRỊ..."
          
          # Tạo file kết quả
          if [ ! -f results.json ]; then
              echo '[]' > results.json
              echo "Không tìm thấy lỗ hổng nào" > results.txt
          fi
          
          # Lọc lỗi có giá trị (Critical, High, Medium)
          echo "=================================================="
          echo "👑 LỖI CÓ GIÁ TRỊ (Critical, High, Medium)"
          echo "=================================================="
          
          CRITICAL=$(jq -r 'select(.info.severity=="critical")' results.json 2>/dev/null | wc -l || echo 0)
          HIGH=$(jq -r 'select(.info.severity=="high")' results.json 2>/dev/null | wc -l || echo 0)
          MEDIUM=$(jq -r 'select(.info.severity=="medium")' results.json 2>/dev/null | wc -l || echo 0)
          TOTAL=$((CRITICAL + HIGH + MEDIUM))
          
          echo "🔥 CRITICAL: $CRITICAL"
          echo "⚡ HIGH: $HIGH"
          echo "🟡 MEDIUM: $MEDIUM"
          echo "📦 TỔNG GIÁ TRỊ: $TOTAL"
          echo "=================================================="
          
          # Tạo báo cáo giá trị
          cat > report.txt << 'EOF'
          👑 CHỦ NHÂN VŨ TRỤ - LỖI CÓ GIÁ TRỊ
          ========================================
          
          📊 THỐNG KÊ LỖI CÓ GIÁ TRỊ
          ========================================
          EOF
          
          echo "🔥 CRITICAL: $CRITICAL" >> report.txt
          echo "⚡ HIGH: $HIGH" >> report.txt
          echo "🟡 MEDIUM: $MEDIUM" >> report.txt
          echo "📦 TỔNG GIÁ TRỊ: $TOTAL" >> report.txt
          echo "========================================" >> report.txt
          
          # Liệt kê lỗi Critical
          if [ $CRITICAL -gt 0 ]; then
              echo "" >> report.txt
              echo "🔥 CRITICAL:" >> report.txt
              jq -r 'select(.info.severity=="critical") | "[🔥] " + .info.name + " → " + .matched-at' results.json 2>/dev/null | head -50 >> report.txt
          fi
          
          # Liệt kê lỗi High
          if [ $HIGH -gt 0 ]; then
              echo "" >> report.txt
              echo "⚡ HIGH:" >> report.txt
              jq -r 'select(.info.severity=="high") | "[⚡] " + .info.name + " → " + .matched-at' results.json 2>/dev/null | head -50 >> report.txt
          fi
          
          # Liệt kê lỗi Medium
          if [ $MEDIUM -gt 0 ]; then
              echo "" >> report.txt
              echo "🟡 MEDIUM:" >> report.txt
              jq -r 'select(.info.severity=="medium") | "[🟡] " + .info.name + " → " + .matched-at' results.json 2>/dev/null | head -50 >> report.txt
          fi
          
          # Danh sách web đã quét
          echo "" >> report.txt
          echo "📋 DANH SÁCH WEB ĐÃ QUÉT:" >> report.txt
          cat targets.txt >> report.txt
          
          # Tạo file chỉ chứa lỗi giá trị cao
          jq 'select(.info.severity=="critical" or .info.severity=="high" or .info.severity=="medium")' results.json 2>/dev/null > high_value_results.json || echo '[]' > high_value_results.json

      - name: 💾 LƯU KHO BÁU
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-report-${{ github.run_id }}
          path: |
            results.txt
            results.json
            high_value_results.json
            results.jsonl
            report.txt
            report.html
            report.db
            targets.txt
            history.json
            /tmp/nuclei-project/
          retention-days: 30
