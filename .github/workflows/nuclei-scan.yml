name: "NUCLEI PRO - Tự Động Quét & Xác Minh Siêu Chính Xác"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *' # Chạy mỗi 4 giờ một lần

jobs:
  nuclei-scan:
    runs-on: ubuntu-latest
    container:
      image: projectdiscovery/nuclei:latest

    steps:
      - name: Cập nhật hệ thống & công cụ
        run: |
          apt-get update && apt-get install -y jq parallel curl
          nuclei -up && nuclei -ut # Cập nhật Nuclei & mẫu mới nhất

      - name: Kiểm tra tệp mục tiêu
        run: |
          if [ ! -f targets.txt ] || [ ! -s targets.txt ]; then
            echo "❌ KHÔNG TÌM THẤY targets.txt HOẶC TỆP TRỐNG!"
            exit 1
          fi
          echo "✅ Tìm thấy $(wc -l < targets.txt) mục tiêu cần quét"

      - name: 🚀 QUÉT CHÍNH - CHỈ LỖI NẶNG & NGHIÊM TRỌNG
        run: |
          nuclei -l targets.txt \
            -severity critical,high \
            -c 100 \
            -rate-limit 200 \
            -bulk-size 50 \
            -timeout 15 \
            -retries 2 \
            -json-export raw_full.json \
            -silent

          if [ ! -f raw_full.json ] || [ ! -s raw_full.json ]; then
            echo "✅ KHÔNG TÌM THẤY LỖI NÀO NGHIÊM TRỌNG!"
            exit 0
          fi
          echo "✅ Hoàn tất quét, tìm thấy $(wc -l < raw_full.json) kết quả tiềm năng"

      - name: 🧠 XÁC MINH THÔNG MINH - LOẠI BỎ BÁO SAI
        run: |
          echo "============================================================" > REPORT_CRITICAL.txt
          echo "🚨 BÁO CÁO LỖI NGHIÊM TRỌNG & CAO - SẴN SÀNG NỘP THƯỞNG" >> REPORT_CRITICAL.txt
          echo "============================================================" >> REPORT_CRITICAL.txt
          echo "📅 Thời gian tạo: $(date)" >> REPORT_CRITICAL.txt
          echo "" >> REPORT_CRITICAL.txt

          jq -c '.' raw_full.json | parallel -j 50 '
            {} | while read -r line; do
              TEMPLATE=$(echo "$line" | jq -r ".template_id")
              SEV=$(echo "$line" | jq -r ".info.severity")
              URL=$(echo "$line" | jq -r ".matched-at")
              NAME=$(echo "$line" | jq -r ".info.name")
              DESC=$(echo "$line" | jq -r ".info.description // \"Không có mô tả\"")
              REQ=$(echo "$line" | jq -r ".request // \"\"")
              RESP=$(echo "$line" | jq -r ".response // \"\"")

              # === KIỂM TRA LẠI ĐIỀU KIỆN THẬT CHẤT ===
              VALID=true

              # Loại bỏ các trường hợp báo sai phổ biến
              if echo "$NAME" | grep -qiE "default-credentials|example|demo|test"; then VALID=false; fi
              if echo "$URL" | grep -qiE "\.github\.io|example\.com|test\.|demo\."; then VALID=false; fi

              # Kiểm tra phản hồi thực tế còn tồn tại lỗi không
              if [ "$VALID" = true ]; then
                ACTUAL_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 8 "$URL" 2>/dev/null || echo "000")
                if [[ "$ACTUAL_STATUS" =~ ^(404|410|000)$ ]]; then VALID=false; fi
              fi

              # === GHI LẠI LỖI CHẮC CHẮN ===
              if [ "$VALID" = true ]; then
                echo "🔴 [$SEV] $NAME" >> REPORT_CRITICAL.txt
                echo "🔗 Đường dẫn: $URL" >> REPORT_CRITICAL.txt
                echo "📄 Mẫu quét: $TEMPLATE" >> REPORT_CRITICAL.txt
                echo "ℹ️ Mô tả: $DESC" >> REPORT_CRITICAL.txt
                echo "🧾 Bằng chứng gốc:" >> REPORT_CRITICAL.txt
                [ -n "$REQ" ] && echo "→ Yêu cầu: ${REQ:0:300}..." >> REPORT_CRITICAL.txt
                [ -n "$RESP" ] && echo "→ Phản hồi: ${RESP:0:500}..." >> REPORT_CRITICAL.txt
                echo "✅ TRẠNG THÁI: CHƯA VÁ - HOÀN TOÀN HỢP LỆ NỘP THƯỞNG" >> REPORT_CRITICAL.txt
                echo "------------------------------------------------------------" >> REPORT_CRITICAL.txt
              fi
            done
          '

          # Tóm tắt kết quả
          TOTAL=$(grep -c "🔴 \[" REPORT_CRITICAL.txt || echo 0)
          echo "" >> REPORT_CRITICAL.txt
          echo "============================================================" >> REPORT_CRITICAL.txt
          echo "📊 TỔNG KẾT: TÌM THẤY $TOTAL LỖI NGHIÊM TRỌNG CHẮC CHẮN" >> REPORT_CRITICAL.txt
          echo "💸 SẴN SÀNG NỘP LÊN: HackerOne / Bugcrowd / Immunefi" >> REPORT_CRITICAL.txt
          echo "============================================================" >> REPORT_CRITICAL.txt

          echo "✅ Xong! Tìm thấy $TOTAL lỗi hợp lệ"
          cat REPORT_CRITICAL.txt

      - name: 💾 LƯU & TẢI VỀ BÁO CÁO
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BAO-CAO-LOI-NGHIEM-TRONG-${{ github.run_id }}
          path: |
            raw_full.json
            REPORT_CRITICAL.txt
          retention-days: 90 # Lưu lâu hơn cho bạn tiện xem lại
