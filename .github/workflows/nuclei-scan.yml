name: "🧠 CHỦ NHÂN VŨ TRỤ - CHIP V10.0 CHỦ QUYỀN"

on:
  workflow_dispatch:
    inputs:
      severity_level:
        description: '📊 MỨC ĐỘ LỖ HỔNG'
        required: false
        default: 'critical,high,medium,low,info'
        type: choice
        options:
          - critical,high
          - critical,high,medium
          - critical,high,medium,low
          - critical,high,medium,low,info
      scan_mode:
        description: '🚀 CHẾ ĐỘ QUÉT'
        required: false
        default: 'ultimate'
        type: choice
        options:
          - fast
          - smart
          - deep
          - ultimate
      ai_level:
        description: '🧠 CẤP ĐỘ AI'
        required: false
        default: '20x'
        type: choice
        options:
          - 10x
          - 20x
          - 50x
      target_count:
        description: '🎯 SỐ WEB CẦN QUÉT'
        required: false
        default: '100'
        type: choice
        options:
          - 50
          - 100
          - 200
          - 500
          - 1000
  schedule:
    - cron: '0 */2 * * *'

jobs:
  ultimate-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    
    steps:
      - name: 🧠 KHỞI TẠO CHIP V10.0 CHỦ QUYỀN VŨ TRỤ
        run: |
          echo "╔══════════════════════════════════════════════════════════════════════════════╗"
          echo "║                                                                            ║"
          echo "║        🧠 CHIP V10.0 - CHỦ QUYỀN VŨ TRỤ - SIÊU TRÍ TUỆ 50X                ║"
          echo "║                                                                            ║"
          echo "╚══════════════════════════════════════════════════════════════════════════════╝"
          echo ""
          echo "🔥 CẤP ĐỘ AI: ${{ github.event.inputs.ai_level || '20x' }}"
          echo "🚀 CHẾ ĐỘ QUÉT: ${{ github.event.inputs.scan_mode || 'ultimate' }}"
          echo "🎯 SỐ WEB: ${{ github.event.inputs.target_count || '100' }}"
          echo "📊 MỨC ĐỘ LỖI: ${{ github.event.inputs.severity_level || 'critical,high,medium,low,info' }}"
          echo ""
          echo "🔌 CHIP V10.0 ĐANG KHỞI TẠO..."
          echo "🔋 NẠP NĂNG LƯỢNG: 0% → 100%"
          echo "🧠 KẾT NỐI AI 50X..."
          echo "🌍 KẾT NỐI MẠNG TOÀN CẦU..."
          echo "✅ CHIP V10.0 CHỦ QUYỀN ĐÃ SẴN SÀNG!"

      - name: 📥 TẢI MÃ NGUỒN
        uses: actions/checkout@v4

      - name: 📦 CÀI ĐẶT CÔNG CỤ - CHIP V10.0 TỐI ƯU
        run: |
          echo "🔥 CHIP V10.0 ĐANG CÀI ĐẶT CÔNG CỤ TỐI ƯU..."
          
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            jq curl git python3 python3-pip \
            massdns dnsrecon dnsenum \
            nmap ffuf unzip wget \
            && sudo rm -rf /var/lib/apt/lists/*
          
          echo "📥 CHIP V10.0 ĐANG TẢI NUCLEI SIÊU TỐC..."
          wget -q --show-progress https://go.dev/dl/go1.21.5.linux-amd64.tar.gz
          sudo tar -C /usr/local -xzf go1.21.5.linux-amd64.tar.gz
          export PATH=$PATH:/usr/local/go/bin
          echo "export PATH=$PATH:/usr/local/go/bin" >> ~/.bashrc
          
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          sudo cp ~/go/bin/nuclei /usr/local/bin/
          
          echo "🔍 NUCLEI VERSION: $(nuclei -version 2>/dev/null | head -1 || echo 'N/A')"
          
          pip3 install -q --no-cache-dir requests beautifulsoup4 lxml
          
          echo "📥 CHIP V10.0 CẬP NHẬT TEMPLATE NUCLEI..."
          for i in 1 2 3; do
            nuclei -update-templates -silent && break || echo "⚠️ Lỗi lần $i, thử lại..."
            sleep 5
          done
          
          nuclei -templates-version
          
          echo "📥 CHIP V10.0 TẢI TEMPLATE BỔ SUNG..."
          mkdir -p ~/nuclei-templates
          cd ~/nuclei-templates
          
          git clone --depth 1 -q https://github.com/projectdiscovery/nuclei-templates.git official 2>/dev/null &
          git clone --depth 1 -q https://github.com/geeknik/nuclei-templates.git geeknik 2>/dev/null &
          git clone --depth 1 -q https://github.com/notnotnotveg/nuclei-templates.git extra 2>/dev/null &
          git clone --depth 1 -q https://github.com/random-robbie/nuclei-templates.git random 2>/dev/null &
          git clone --depth 1 -q https://github.com/zeroc00I/nuclei-templates.git zero 2>/dev/null &
          wait
          
          echo "✅ CHIP V10.0 CÀI ĐẶT HOÀN TẤT!"

      - name: 🌍 CHIP V10.0 - TÌM WEB TOÀN CẦU THÔNG MINH
        id: get_targets
        run: |
          echo "🌌 CHIP V10.0 CHỦ QUYỀN ĐANG TÌM WEB TOÀN CẦU..."
          
          TARGET_LIMIT=${{ github.event.inputs.target_count || '100' }}
          
          cat > chip_v10_finder.py << 'PYEOF'
          import json, re, requests, random, time, os, sys
          from bs4 import BeautifulSoup
          from datetime import datetime
          from concurrent.futures import ThreadPoolExecutor, as_completed
          import hashlib
          
          # ============================================================
          # 1. CHIP V10.0 - CHỦ QUYỀN VŨ TRỤ
          # ============================================================
          class ChipV10:
              def __init__(self, ai_level='20x'):
                  self.version = "V10.0"
                  self.ai_level = ai_level
                  self.power = 100  # 100% sức mạnh
                  self.stability = 100
                  self.performance = "ultimate"
                  self.automation = 100  # 100% tự động hóa
                  self.optimization = {
                      'concurrency': 150,
                      'bulk_size': 75,
                      'rate_limit': 0,
                      'timeout': 25,
                      'retries': 5,
                      'max_redirects': 10
                  }
                  self.scanned_count = 0
                  self.found_vulns = 0
                  self.bounty_estimate = 0
                  
              def adjust_parameters(self, target_count):
                  """CHIP V10.0 tự động điều chỉnh thông số tối ưu nhất"""
                  if target_count <= 50:
                      self.optimization = {'concurrency': 60, 'bulk_size': 25, 'rate_limit': 25, 'timeout': 12, 'retries': 3, 'max_redirects': 5}
                  elif target_count <= 100:
                      self.optimization = {'concurrency': 100, 'bulk_size': 40, 'rate_limit': 40, 'timeout': 18, 'retries': 4, 'max_redirects': 7}
                  elif target_count <= 200:
                      self.optimization = {'concurrency': 150, 'bulk_size': 75, 'rate_limit': 0, 'timeout': 25, 'retries': 5, 'max_redirects': 10}
                  elif target_count <= 500:
                      self.optimization = {'concurrency': 200, 'bulk_size': 100, 'rate_limit': 80, 'timeout': 30, 'retries': 5, 'max_redirects': 10}
                  else:
                      self.optimization = {'concurrency': 250, 'bulk_size': 120, 'rate_limit': 120, 'timeout': 35, 'retries': 6, 'max_redirects': 12}
                  
                  self.stability = 100 - (target_count // 20)
                  if self.stability < 60:
                      self.stability = 60
                  
                  return self.optimization
              
              def analyze_web_value(self, domain):
                  """CHIP V10.0 phân tích giá trị web - Tìm web có tiền"""
                  score = 0
                  reasons = []
                  bounty_estimate = 0
                  
                  # === CHIP V10.0 - 20 TIÊU CHÍ ĐÁNH GIÁ ===
                  
                  # 1. CMS phổ biến - Nhiều lỗ hổng
                  cms_list = ['wordpress', 'shopify', 'magento', 'drupal', 'joomla', 'laravel', 'django', 'rails']
                  if any(x in domain for x in cms_list):
                      score += 15
                      bounty_estimate += 500
                      reasons.append("CMS phổ biến - Lỗi giá trị cao")
                  
                  # 2. Domain chính phủ/giáo dục - Bounty cao
                  if any(x in domain for x in ['.gov', '.edu', '.mil', '.gouv']):
                      score += 25
                      bounty_estimate += 2000
                      reasons.append("Domain chính phủ - Bounty cực cao")
                  
                  # 3. Domain tài chính - Lỗi giá trị cực cao
                  finance_keywords = ['bank', 'finance', 'pay', 'crypto', 'coin', 'wallet', 'exchange', 'trading', 'invest']
                  if any(x in domain for x in finance_keywords):
                      score += 20
                      bounty_estimate += 3000
                      reasons.append("Domain tài chính - Lỗi cực cao")
                  
                  # 4. Web3/Blockchain - Bounty lên đến $1M
                  web3_keywords = ['eth', 'sol', 'polygon', 'avalanche', 'bridge', 'defi', 'nft', 'swap', 'lend', 'dao']
                  if any(x in domain for x in web3_keywords):
                      score += 30
                      bounty_estimate += 10000
                      reasons.append("Web3/Blockchain - Bounty $1M")
                  
                  # 5. Domain có subdomain - Nhiều service
                  if domain.count('.') > 1:
                      score += 8
                      bounty_estimate += 300
                      reasons.append("Subdomain - Nhiều service")
                  
                  # 6. Domain từ Bug Bounty platforms
                  bug_bounty_platforms = ['hackerone', 'bugcrowd', 'immunefi', 'intigriti', 'yeswehack']
                  if any(x in domain for x in bug_bounty_platforms):
                      score += 20
                      bounty_estimate += 5000
                      reasons.append("Bug Bounty Platform - Chính thức")
                  
                  # 7. Domain ngắn - Web lớn
                  if len(domain) < 10:
                      score += 5
                      bounty_estimate += 200
                      reasons.append("Domain ngắn - Web lớn")
                  
                  # 8. Domain có số - Dễ có lỗi
                  if any(c.isdigit() for c in domain):
                      score += 8
                      bounty_estimate += 300
                      reasons.append("Có số - Dễ có lỗi")
                  
                  # 9. Domain từ các nước có nhiều bug bounty
                  high_bounty_countries = ['.com', '.io', '.co', '.ai', '.vn', '.jp', '.kr', '.sg', '.de', '.uk', '.fr', '.ca']
                  if any(x in domain for x in high_bounty_countries):
                      score += 3
                      reasons.append("Nước có nhiều bug bounty")
                  
                  # 10. Domain có từ khóa bảo mật
                  security_keywords = ['security', 'auth', 'login', 'admin', 'api', 'gateway', 'proxy', 'vpn', 'firewall']
                  if any(x in domain for x in security_keywords):
                      score += 10
                      bounty_estimate += 500
                      reasons.append("Từ khóa bảo mật - Dễ có lỗi")
                  
                  # 11. E-commerce - Nhiều lỗ hổng thanh toán
                  ecommerce_keywords = ['shop', 'store', 'buy', 'sell', 'cart', 'checkout', 'payment', 'order']
                  if any(x in domain for x in ecommerce_keywords):
                      score += 12
                      bounty_estimate += 800
                      reasons.append("E-commerce - Lỗi thanh toán")
                  
                  # 12. Healthcare - Dữ liệu nhạy cảm
                  healthcare_keywords = ['health', 'medical', 'hospital', 'clinic', 'pharma', 'doctor', 'patient']
                  if any(x in domain for x in healthcare_keywords):
                      score += 15
                      bounty_estimate += 1500
                      reasons.append("Healthcare - Dữ liệu nhạy cảm")
                  
                  # 13. Domain có số lượng request lớn
                  if 'api' in domain or 'graphql' in domain or 'rest' in domain:
                      score += 10
                      bounty_estimate += 500
                      reasons.append("API/GraphQL - Nhiều lỗ hổng")
                  
                  # 14. Domain có từ khóa ngân hàng
                  bank_keywords = ['bank', 'credit', 'loan', 'mortgage', 'savings', 'deposit', 'withdraw']
                  if any(x in domain for x in bank_keywords):
                      score += 25
                      bounty_estimate += 5000
                      reasons.append("Ngân hàng - Bounty cực cao")
                  
                  # 15. Domain có từ khóa tiền điện tử
                  crypto_keywords = ['btc', 'eth', 'usdt', 'usdc', 'dai', 'uni', 'aave', 'comp', 'mkr']
                  if any(x in domain for x in crypto_keywords):
                      score += 30
                      bounty_estimate += 10000
                      reasons.append("Tiền điện tử - Bounty $1M")
                  
                  # 16. Domain có từ khóa bảo hiểm
                  insurance_keywords = ['insure', 'insurance', 'claim', 'policy', 'coverage', 'benefit']
                  if any(x in domain for x in insurance_keywords):
                      score += 12
                      bounty_estimate += 800
                      reasons.append("Bảo hiểm - Dữ liệu nhạy cảm")
                  
                  # 17. Domain có từ khóa giáo dục
                  edu_keywords = ['edu', 'school', 'university', 'college', 'academy', 'learn', 'study']
                  if any(x in domain for x in edu_keywords):
                      score += 10
                      bounty_estimate += 500
                      reasons.append("Giáo dục - Dữ liệu sinh viên")
                  
                  # 18. Domain có từ khóa chính phủ
                  gov_keywords = ['gov', 'state', 'federal', 'president', 'senate', 'congress', 'parliament']
                  if any(x in domain for x in gov_keywords):
                      score += 20
                      bounty_estimate += 2000
                      reasons.append("Chính phủ - Bounty cao")
                  
                  # 19. Domain có từ khóa quân sự
                  military_keywords = ['army', 'navy', 'airforce', 'military', 'defense', 'defence', 'pentagon']
                  if any(x in domain for x in military_keywords):
                      score += 25
                      bounty_estimate += 5000
                      reasons.append("Quân sự - Bounty cực cao")
                  
                  # 20. Domain có từ khóa công nghệ
                  tech_keywords = ['tech', 'ai', 'ml', 'cloud', 'data', 'analytics', 'cyber', 'security', 'digital']
                  if any(x in domain for x in tech_keywords):
                      score += 8
                      bounty_estimate += 300
                      reasons.append("Công nghệ - Bounty cao")
                  
                  # Nhân với cấp độ AI
                  multiplier = 5 if self.ai_level == '10x' else 10 if self.ai_level == '20x' else 25
                  final_score = score * multiplier
                  
                  # Xác định priority
                  if final_score > 80:
                      priority = 0  # Ưu tiên cao nhất - Web có tiền
                  elif final_score > 50:
                      priority = 1  # Ưu tiên cao
                  elif final_score > 25:
                      priority = 2  # Ưu tiên trung bình
                  else:
                      priority = 3  # Ưu tiên thấp
                  
                  return {
                      'score': int(final_score),
                      'reasons': reasons[:5],
                      'priority': priority,
                      'bounty_estimate': bounty_estimate,
                      'ai_level': self.ai_level,
                      'has_money': bounty_estimate > 500  # Có tiền nếu bounty > $500
                  }
              
              def predict_vulnerabilities(self, domain):
                  """CHIP V10.0 dự đoán khả năng có lỗ hổng"""
                  vuln_probability = 0
                  
                  # Dựa trên domain
                  if any(x in domain for x in ['wordpress', 'drupal', 'joomla']):
                      vuln_probability += 40
                  if any(x in domain for x in ['api', 'auth', 'login']):
                      vuln_probability += 25
                  if any(x in domain for x in ['bank', 'finance', 'pay']):
                      vuln_probability += 30
                  if any(x in domain for x in ['gov', 'edu', 'mil']):
                      vuln_probability += 35
                  if any(x in domain for x in ['crypto', 'blockchain', 'defi']):
                      vuln_probability += 45
                  if any(x in domain for x in ['shop', 'store', 'cart']):
                      vuln_probability += 20
                  
                  # Dựa trên độ dài
                  if len(domain) > 20:
                      vuln_probability += 10
                  
                  # Dựa trên số lượng subdomain
                  if domain.count('.') > 2:
                      vuln_probability += 15
                  
                  return min(vuln_probability, 98)
              
              def calculate_bounty_potential(self, domain, vuln_probability):
                  """CHIP V10.0 tính toán tiềm năng bounty"""
                  base_bounty = 0
                  
                  if 'bank' in domain or 'finance' in domain:
                      base_bounty = 5000
                  elif 'crypto' in domain or 'blockchain' in domain:
                      base_bounty = 10000
                  elif 'gov' in domain or 'edu' in domain:
                      base_bounty = 3000
                  elif 'shop' in domain or 'store' in domain:
                      base_bounty = 1000
                  else:
                      base_bounty = 500
                  
                  # Nhân với xác suất có lỗ hổng
                  final_bounty = base_bounty * (vuln_probability / 100)
                  
                  return int(final_bounty)
          
          # ============================================================
          # 2. CHIP V10.0 - WEB COLLECTOR TOÀN CẦU TỰ ĐỘNG
          # ============================================================
          class GlobalWebCollectorV10:
              def __init__(self, chip, limit=100):
                  self.chip = chip
                  self.limit = limit
                  self.targets = []
                  self.seen = set()
                  self.sources_stats = {}
                  self.bounty_targets = []
                  
              def collect_from_source(self, name, domains, source_type):
                  """CHIP V10.0 thu thập và phân tích từ nguồn"""
                  for domain in domains:
                      if domain not in self.seen:
                          self.seen.add(domain)
                          analysis = self.chip.analyze_web_value(domain)
                          vuln_prob = self.chip.predict_vulnerabilities(domain)
                          bounty = self.chip.calculate_bounty_potential(domain, vuln_prob)
                          
                          self.targets.append({
                              'domain': domain,
                              'source': name,
                              'type': source_type,
                              'priority': analysis['priority'],
                              'score': analysis['score'],
                              'reasons': analysis['reasons'],
                              'vuln_probability': vuln_prob,
                              'bounty_estimate': bounty,
                              'has_money': analysis['has_money']
                          })
                          
                          if analysis['has_money']:
                              self.bounty_targets.append(domain)
                          
                          self.sources_stats[name] = self.sources_stats.get(name, 0) + 1
              
              def collect_from_hackerone(self):
                  """CHIP V10.0 lấy từ HackerOne"""
                  print("🔍 CHIP V10.0: HackerOne...")
                  try:
                      url = "https://hackerone.com/programs/search?query=type:public"
                      headers = {'User-Agent': 'ChipV10.0/10.0'}
                      r = requests.get(url, timeout=30, headers=headers)
                      if r.status_code == 200:
                          soup = BeautifulSoup(r.text, 'html.parser')
                          domains = []
                          for link in soup.find_all('a', href=True):
                              if '/programs/' in link['href']:
                                  parts = link['href'].split('/')
                                  for part in parts:
                                      if '.' in part and len(part) > 3:
                                          domains.append(part.strip().lower())
                          self.collect_from_source('HackerOne', domains[:80], 'BugBounty')
                  except Exception as e:
                      print(f"⚠️ Lỗi HackerOne: {e}")
              
              def collect_from_bugcrowd(self):
                  """CHIP V10.0 lấy từ Bugcrowd"""
                  print("🔍 CHIP V10.0: Bugcrowd...")
                  try:
                      url = "https://bugcrowd.com/programs"
                      headers = {'User-Agent': 'ChipV10.0/10.0'}
                      r = requests.get(url, timeout=30, headers=headers)
                      if r.status_code == 200:
                          soup = BeautifulSoup(r.text, 'html.parser')
                          domains = []
                          for item in soup.find_all(['a', 'div']):
                              text = item.text.strip()
                              if '.' in text and len(text) > 5 and ' ' not in text:
                                  domain = text.lower().strip()
                                  if not any(x in domain for x in ['bugcrowd', 'hackerone']):
                                      domains.append(domain)
                          self.collect_from_source('Bugcrowd', domains[:80], 'BugBounty')
                  except Exception as e:
                      print(f"⚠️ Lỗi Bugcrowd: {e}")
              
              def collect_from_immunefi(self):
                  """CHIP V10.0 lấy từ Immunefi"""
                  print("🔍 CHIP V10.0: Immunefi...")
                  try:
                      url = "https://immunefi.com/explore/"
                      headers = {'User-Agent': 'ChipV10.0/10.0'}
                      r = requests.get(url, timeout=30, headers=headers)
                      if r.status_code == 200:
                          soup = BeautifulSoup(r.text, 'html.parser')
                          domains = []
                          for link in soup.find_all('a', href=True):
                              if '/bounty/' in link['href']:
                                  parts = link['href'].split('/')
                                  for part in parts:
                                      if '.' in part and len(part) > 3:
                                          domains.append(part.strip().lower())
                          self.collect_from_source('Immunefi', domains[:50], 'Web3')
                  except Exception as e:
                      print(f"⚠️ Lỗi Immunefi: {e}")
              
              def collect_from_top_global(self):
                  """CHIP V10.0 lấy Top Global Websites"""
                  print("🔍 CHIP V10.0: Top Global...")
                  top_websites = [
                      # USA - Top 20
                      'google.com', 'youtube.com', 'facebook.com', 'twitter.com', 'instagram.com',
                      'linkedin.com', 'reddit.com', 'netflix.com', 'amazon.com', 'ebay.com',
