name: "Nuclei Engine 24/7 Pro"

on:
  workflow_dispatch:
    inputs:
      target_count:
        description: '🎯 SỐ WEB CẦN CHỌN'
        required: false
        default: '200'
        type: choice
        options:
          - 100
          - 200
          - 300
          - 500
  schedule:
    - cron: '0 */6 * * *'

jobs:
  auto-find-targets:
    runs-on: ubuntu-latest
    outputs:
      target_count: ${{ steps.count.outputs.target_count }}
    steps:
      - name: 🌍 TỰ ĐỘNG TÌM 200 WEB GIÁ TRỊ CAO
        id: find
        run: |
          echo "🌍 ĐANG QUÉT HÀNG TỶ WEB + HACKERONE + BUGCROWD + IMMUNEFI..."
          
          # Tạo file Python tìm web
          cat > /tmp/finder.py << 'EOF'
          import json, requests, subprocess, re
          
          print("🧠 AUTO FINDER - QUÉT TOÀN CẦU")
          all_targets, seen = [], set()
          
          # HACKERONE
          try:
              r = requests.get("https://hackerone.com/programs/search?query=type:public", timeout=20)
              for part in re.findall(r'[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}', r.text):
                  d = part.lower()
                  if d not in seen and len(d) > 3 and 'hackerone' not in d:
                      seen.add(d); all_targets.append({"domain": d, "source": "HackerOne", "score": 95})
          except: pass
          
          # BUGCROWD
          try:
              r = requests.get("https://bugcrowd.com/programs", timeout=20)
              for part in re.findall(r'[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}', r.text):
                  d = part.lower()
                  if d not in seen and len(d) > 3 and 'bugcrowd' not in d:
                      seen.add(d); all_targets.append({"domain": d, "source": "Bugcrowd", "score": 90})
          except: pass
          
          # IMMUNEFI
          try:
              r = requests.get("https://immunefi.com/explore/", timeout=20)
              for part in re.findall(r'[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}', r.text):
                  d = part.lower()
                  if d not in seen and len(d) > 3 and 'immunefi' not in d:
                      seen.add(d); all_targets.append({"domain": d, "source": "Immunefi", "score": 98})
          except: pass
          
          # TOP 1M - HÀNG TRIỆU WEB
          try:
              r = requests.get("https://raw.githubusercontent.com/mehulj94/top-1m/master/top-1m.txt", timeout=20)
              if r.status_code == 200:
                  for line in r.text.splitlines()[:5000]:
                      d = line.strip().lower()
                      if d and '.' in d and d not in seen:
                          score = 20
                          if any(k in d for k in ["bank","finance","pay"]): score += 40
                          if any(k in d for k in ["crypto","blockchain","defi"]): score += 45
                          if any(k in d for k in ["gov","government"]): score += 35
                          if any(k in d for k in ["api","auth","login","admin"]): score += 30
                          if d.endswith(".gov") or d.endswith(".edu"): score += 15
                          if score > 30:
                              seen.add(d); all_targets.append({"domain": d, "source": "Top1M", "score": score})
          except: pass
          
          print(f"📊 TỔNG WEB TÌM: {len(all_targets)}")
          all_targets.sort(key=lambda x: x["score"], reverse=True)
          
          target = 200
          top = all_targets[:target*3]
          alive = []
          
          print("🔍 KIỂM TRA WEB SỐNG...")
          for t in top:
              if len(alive) >= target: break
              url = f"https://{t['domain']}"
              try:
                  c = subprocess.run(["curl","-s","-o","/dev/null","-w","%{http_code}",url], capture_output=True, text=True, timeout=5).stdout.strip()
                  if c in ["200","301","302","403"]:
                      alive.append(t); print(f"  ✅ {url}")
              except: pass
          
          print(f"📊 WEB SỐNG: {len(alive)}/{target}")
          with open("targets.txt", "w") as f:
              for t in alive: f.write(f"https://{t['domain']}\n")
          
          print(f"✅ ĐÃ CHỌN {len(alive)} WEB TỪ HÀNG TỶ TRANG")
          EOF
          
          python3 /tmp/finder.py
          
          # Đếm số lượng
          COUNT=$(wc -l < targets.txt 2>/dev/null || echo 0)
          echo "target_count=$COUNT" >> $GITHUB_ENV
          echo "target_count=$COUNT" >> $GITHUB_OUTPUT
          
          echo "🎯 SỐ WEB: $COUNT"
          head -10 targets.txt

      - name: Upload targets
        uses: actions/upload-artifact@v4
        with:
          name: targets
          path: targets.txt
          retention-days: 1

  nuclei-scan:
    needs: auto-find-targets
    runs-on: ubuntu-latest
    container:
      image: projectdiscovery/nuclei:latest
    steps:
      - name: Download targets
        uses: actions/download-artifact@v4
        with:
          name: targets

      - name: Multi-Thread Parallel Scanning
        run: |
          echo "🧠 NUCLEI ENGINE 24/7 PRO - QUÉT ${{ needs.auto-find-targets.outputs.target_count }} WEB"
          echo "🔥 BẮT ĐẦU QUÉT..."
          
          nuclei -list targets.txt \
                 -c 30 \
                 -rate-limit 150 \
                 -bulk-size 30 \
                 -scan-all-ips \
                 -severity critical,high,medium \
                 -stats \
                 -stats-interval 10 \
                 -json-export results.json \
                 -o results.txt \
                 -silent \
                 -no-color

      - name: Báo cáo
        if: always()
        run: |
          echo "📊 KẾT QUẢ QUÉT:"
          echo "=================================================="
          TOTAL=$(cat results.txt 2>/dev/null | wc -l || echo 0)
          echo "📦 TỔNG LỖI CÓ TIỀN: $TOTAL"
          
          if [ -f results.json ]; then
              CRITICAL=$(jq -r 'select(.info.severity=="critical")' results.json 2>/dev/null | wc -l || echo 0)
              HIGH=$(jq -r 'select(.info.severity=="high")' results.json 2>/dev/null | wc -l || echo 0)
              MEDIUM=$(jq -r 'select(.info.severity=="medium")' results.json 2>/dev/null | wc -l || echo 0)
              BOUNTY=$((CRITICAL * 5000 + HIGH * 1000 + MEDIUM * 200))
              
              echo "🔥 CRITICAL: $CRITICAL (💰 \$5,000+ mỗi lỗi)"
              echo "⚡ HIGH: $HIGH (💰 \$1,000+ mỗi lỗi)"
              echo "🟡 MEDIUM: $MEDIUM (💰 \$200+ mỗi lỗi)"
              echo "💰 TỔNG BOUNTY: \$$(printf "%'d" $BOUNTY)"
              
              echo ""
              echo "📋 CHI TIẾT LỖI:"
              jq -r 'select(.info.severity=="critical" or .info.severity=="high" or .info.severity=="medium") | "📌 " + .info.name + " → " + .matched-at + " | " + .info.severity + " | CVE: " + (.info.cve_id // "N/A")' results.json 2>/dev/null | head -20
          fi
          echo "=================================================="

      - name: Lưu và đóng gói kết quả
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nuclei-vulnerability-report
          path: |
            results.txt
            results.json
          retention-days: 7
