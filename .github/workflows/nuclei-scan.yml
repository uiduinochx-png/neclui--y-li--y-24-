                      'mercadolivre.com', 'globo.com', 'clarin.com', 'eluniversal.com.mx', 'televisa.com',
                      'uol.com.br', 'terra.com.br', 'folha.uol.com.br', 'estadao.com.br', 'milenio.com',
                      # Africa - Top 10
                      'naspers.com', 'mtn.com', 'vodacom.com', 'safaricom.com', 'standardmedia.co.ke',
