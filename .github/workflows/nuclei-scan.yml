name: "NUCLEI PRO - Tự Động Quét & Xác Minh Siêu Chính Xác"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'

jobs:
  nuclei-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Tải toàn bộ tệp dự án
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Kiểm tra & dọn dẹp targets.txt
        run: |
          echo "📂 Thư mục hiện tại: $(pwd)"
          echo "📋 Danh sách tệp: $(ls -la)"
          if [ ! -f targets.txt ]; then
            echo "❌ LỖI: KHÔNG TÌM THẤY targets.txt Ở THƯ MỤC GỐC!"
            exit 1
          fi
          sed -i '/^[[:space:]]*$/d' targets.txt
          sed -i 's/[[:space:]]*$//' targets.txt
          if [ ! -s targets.txt ]; then
            echo "❌ LỖI: Tệp targets.txt SAU KHI DỌN TRỐNG!"
            exit 1
          fi
          echo "✅ ĐÃ TÌM THẤY $(wc -l < targets.txt) MỤC TIÊU HỢP LỆ"

      - name: Cài Nuclei & công cụ phụ trợ
        run: |
          apt-get update && apt-get install -y jq parallel curl wget unzip
          wget -q https://github.com/projectdiscovery/nuclei/releases/latest/download/nuclei_linux_amd64.zip -O nuclei.zip
          unzip -q nuclei.zip && mv nuclei /usr/local/bin/ && chmod +x /usr/local/bin/nuclei
          nuclei -up && nuclei -ut
          nuclei -version

      - name: 🚀 QUÉT CHỈ LỖI NGHIÊM TRỌNG & CAO
        run: |
          nuclei -l targets.txt \
            -severity critical,high \
            -c 80 \
            -rate-limit 150 \
            -bulk-size 30 \
            -timeout 20 \
            -retries 2 \
            -json-export raw_full.json \
            -silent

          if [ ! -f raw_full.json ] || [ ! -s raw_full.json ]; then
            echo "✅ KHÔNG TÌM THẤY LỖI NÀO NGHIÊM TRỌNG!"
            exit 0
          fi
          echo "✅ HOÀN TẤT QUÉT: $(wc -l < raw_full.json) KẾT QUẢ TIỀM NĂNG"

      - name: 🧠 XÁC MINH THÔNG MINH - LOẠI BỎ BÁO SAI
        run: |
          echo "============================================================" > REPORT_CRITICAL.txt
          echo "🚨 BÁO CÁO LỖI NGHIÊM TRỌNG - SẴN SÀNG NỘP THƯỞNG" >> REPORT_CRITICAL.txt
          echo "============================================================" >> REPORT_CRITICAL.txt
          echo "📅 Thời gian: $(date)" >> REPORT_CRITICAL.txt
          echo "" >> REPORT_CRITICAL.txt

          cat raw_full.json | jq -c '.' | parallel -j 30 '
            line="{}"
            TEMPLATE=$(echo "$line" | jq -r ".template_id // \"khong-xac-dinh\"")
            SEV=$(echo "$line" | jq -r ".info.severity // \"unknown\"")
            URL=$(echo "$line" | jq -r ".matched-at // \"\"")
            NAME=$(echo "$line" | jq -r ".info.name // \"Không tên\"")
            DESC=$(echo "$line" | jq -r ".info.description // \"Không mô tả\"")
            REQ=$(echo "$line" | jq -r ".request // \"\"")
            RESP=$(echo "$line" | jq -r ".response // \"\"")

            VALID=true

            if echo "$NAME" | grep -qiE "default-cred|example|demo|test|sample"; then VALID=false; fi
            if echo "$URL" | grep -qiE "\.github\.io|example\.com|test\.|demo\.|localhost"; then VALID=false; fi
            if [ -z "$URL" ]; then VALID=false; fi

            if [ "$VALID" = true ]; then
              ACTUAL_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" 2>/dev/null || echo "000")
              if [[ "$ACTUAL_STATUS" =~ ^(404|410|000)$ ]]; then VALID=false; fi
            fi

            if [ "$VALID" = true ]; then
              echo "🔴 [$SEV] $NAME"
              echo "🔗 Đường dẫn: $URL"
              echo "📄 Mẫu quét: $TEMPLATE"
              echo "ℹ️ Mô tả: $DESC"
              echo "🧾 Bằng chứng gốc:"
              [ -n "$REQ" ] && echo "→ Yêu cầu: ${REQ:0:300}..."
              [ -n "$RESP" ] && echo "→ Phản hồi: ${RESP:0:500}..."
              echo "✅ TRẠNG THÁI: CHƯA VÁ - HỢP LỆ NỘP THƯỞNG"
              echo "------------------------------------------------------------"
            fi
          ' >> REPORT_CRITICAL.txt

          TOTAL=$(grep -c "🔴 \[" REPORT_CRITICAL.txt || echo 0)
          echo "" >> REPORT_CRITICAL.txt
          echo "============================================================" >> REPORT_CRITICAL.txt
          echo "📊 TỔNG CỘNG: $TOTAL LỖI NGHIÊM TRỌNG CHẮC CHẮN" >> REPORT_CRITICAL.txt
          echo "💸 NỘP LÊN: HackerOne / Bugcrowd / Immunefi" >> REPORT_CRITICAL.txt
          echo "============================================================" >> REPORT_CRITICAL.txt

          echo "✅ HOÀN TẤT: TÌM THẤY $TOTAL LỖI HỢP LỆ"
          cat REPORT_CRITICAL.txt

      - name: 💾 LƯU BÁO CÁO
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BAO-CAO-LOI-NGHIEM-TRONG-${{ github.run_id }}
          path: |
            raw_full.json
            REPORT_CRITICAL.txt
          retention-days: 90
